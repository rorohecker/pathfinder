<!doctype html>
<html lang="en" data-theme="mica-dark" data-accent="blue" data-density="cozy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-window">
    <header id="titlebar" class="titlebar" data-tauri-drag-region>
      <div class="app-mark" data-tauri-drag-region>
        <span class="app-logo" aria-hidden="true"></span>
        <span class="app-name">Pathfinder</span>
      </div>
      <div id="tabs" class="tabs" role="tablist" data-tauri-drag-region></div>
      <button id="new-tab-btn" class="title-btn" title="New tab (Ctrl+T)" aria-label="New tab"></button>
      <div class="window-controls" aria-label="Window controls">
        <button id="minimize-btn" class="win-btn" title="Minimize" aria-label="Minimize"><span></span></button>
        <button id="maximize-btn" class="win-btn" title="Maximize" aria-label="Maximize"><span></span></button>
        <button id="close-btn" class="win-btn close" title="Close" aria-label="Close"><span></span></button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar"></aside>

    <section class="toolbar" aria-label="Toolbar">
      <div class="tool-group">
        <button id="back-btn" class="tool-btn" title="Back (Alt+Left)" aria-label="Back"></button>
        <button id="forward-btn" class="tool-btn" title="Forward (Alt+Right)" aria-label="Forward"></button>
        <button id="up-btn" class="tool-btn" title="Up (Alt+Up)" aria-label="Up"></button>
        <button id="refresh-btn" class="tool-btn" title="Refresh (F5)" aria-label="Refresh"></button>
      </div>

      <div class="divider"></div>

      <div id="path-control" class="path-control" title="Click or press Ctrl+L to edit path">
        <div id="breadcrumb" class="breadcrumb"></div>
        <input id="address-bar" class="address-bar" autocomplete="off" spellcheck="false" />
      </div>

      <label class="search-box" title="Search supports ext:, kind:, size:, name:, content:, modified:, tag:">
        <span id="search-icon"></span>
        <input id="search-input" type="search" placeholder="Search ext:pdf size:>1mb tag:blue" spellcheck="false" />
        <kbd>Ctrl+F</kbd>
      </label>

      <div class="divider"></div>

      <div class="segmented" aria-label="View mode">
        <button id="view-grid" class="seg-btn" title="Icon view (Ctrl+1)" aria-label="Icon view"></button>
        <button id="view-list" class="seg-btn" title="Details view (Ctrl+2)" aria-label="Details view"></button>
        <button id="view-gallery" class="seg-btn" title="Gallery view (Ctrl+3)" aria-label="Gallery view"></button>
      </div>

      <button id="preview-toggle" class="tool-btn" title="Preview pane (Ctrl+I)" aria-label="Preview pane"></button>
      <button id="dual-pane-toggle" class="tool-btn" title="Dual pane (Ctrl+\)" aria-label="Dual pane"></button>
      <button id="palette-btn" class="tool-btn" title="Command palette (Ctrl+P)" aria-label="Command palette"></button>
      <button id="settings-btn" class="tool-btn" title="Personalization (Ctrl+,)" aria-label="Personalization"></button>
    </section>

    <main id="main" class="main with-preview">
      <section id="file-pane" class="file-pane" tabindex="0" aria-label="Files"></section>
      <div id="pane-divider" class="pane-divider" hidden></div>
      <section id="file-pane-right" class="file-pane file-pane-right" tabindex="0" aria-label="Files (right pane)" hidden></section>
      <aside id="preview-pane" class="preview-pane" aria-label="Preview"></aside>
    </main>

    <footer id="status-bar" class="status-bar"></footer>
  </div>

  <div id="rubber-band" class="rubber-band" hidden></div>
  <div id="context-menu-root"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toasts"></div>
  <input id="wallpaper-file" type="file" accept="image/*" hidden />

  <script src="main.js"></script>
</body>
</html>
